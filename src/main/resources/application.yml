server:
  port: 8080

spring:
  application:
    name: ai-interview-coach
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_interview_coach
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
